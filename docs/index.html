<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0e0f13">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>跑步听什么</title>
<style>
  :root {
    --bg: #0e0f13; --card: #171a21; --card2: #1d212b; --line: #262b36;
    --text: #e8eaef; --dim: #8b91a0; --acc: #35d399; --acc2: #22d3ee;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "PingFang SC", "HarmonyOS Sans SC", "MiSans", system-ui, sans-serif;
    max-width: 560px; margin: 0 auto; padding: 0 14px calc(24px + env(safe-area-inset-bottom));
    background: var(--bg); color: var(--text);
  }
  header { display: flex; align-items: baseline; gap: 10px; padding: 18px 2px 10px; }
  h1 { font-size: 1.25em; margin: 0; letter-spacing: .02em; }
  h1::before { content: "🏃"; margin-right: 8px; }
  .sub { color: var(--dim); font-size: .78em; }
  #langBtn { margin-left: auto; white-space: nowrap; flex: none; }

  /* ---- 播放卡片 ---- */
  .player {
    position: sticky; top: 10px; z-index: 5;
    background: linear-gradient(180deg, var(--card2), var(--card));
    border: 1px solid var(--line); border-radius: 18px;
    padding: 14px 16px 12px; box-shadow: 0 12px 30px rgba(0,0,0,.45);
  }
  .np-label { font-size: .7em; color: var(--acc); letter-spacing: .18em; }
  .np-title {
    font-size: .95em; line-height: 1.45; margin: 4px 0 2px; min-height: 2.8em;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .status { font-size: .75em; color: var(--dim); min-height: 1.2em; margin-bottom: 2px; }
  .status.err { color: #f87171; }
  .seekrow { display: flex; align-items: center; gap: 10px; font-size: .72em; color: var(--dim); font-variant-numeric: tabular-nums; }
  #seek { flex: 1; accent-color: var(--acc); height: 4px; }
  .controls { display: flex; align-items: center; justify-content: space-between; margin: 8px 6px 4px; }
  .ctl {
    background: none; border: 0; color: var(--text); width: 52px; height: 52px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: .8em; font-weight: 600; cursor: pointer;
  }
  .ctl:active { background: var(--card2); }
  .ctl svg { width: 26px; height: 26px; fill: var(--text); }
  .ctl.big {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--acc), var(--acc2));
    box-shadow: 0 6px 18px rgba(53,211,153,.35);
  }
  .ctl.big svg { width: 30px; height: 30px; fill: #06281c; }
  .pills { display: flex; gap: 8px; justify-content: center; margin-top: 6px; }
  .pill {
    background: var(--card2); border: 1px solid var(--line); color: var(--dim);
    padding: 5px 14px; border-radius: 999px; font-size: .75em; cursor: pointer;
  }
  .pill.on { color: var(--acc); border-color: var(--acc); }

  /* ---- Tab ---- */
  .tabs { display: flex; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 4px; margin: 16px 0 10px; }
  .tabs button {
    flex: 1; background: none; border: 0; color: var(--dim); padding: 9px 0;
    border-radius: 9px; font-size: .9em; cursor: pointer;
  }
  .tabs button.on { background: var(--card2); color: var(--text); font-weight: 600; }

  /* ---- 资讯列表 ---- */
  ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
  #list li {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 12px 14px; cursor: pointer;
  }
  #list li:active { background: var(--card2); }
  #list li.playing { border-color: var(--acc); background: linear-gradient(180deg, rgba(53,211,153,.08), var(--card)); }
  .t { display: block; font-size: .92em; line-height: 1.45; }
  .m { display: flex; align-items: center; gap: 6px; font-size: .74em; color: var(--dim); margin-top: 6px; }
  .src {
    color: var(--acc); background: rgba(53,211,153,.1);
    padding: 1px 8px; border-radius: 999px; font-size: .95em;
  }
  li.playing .t { color: var(--acc); }

  /* ---- 书籍 ---- */
  details.book { background: var(--card); border: 1px solid var(--line); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
  details.book summary { list-style: none; padding: 14px; cursor: pointer; }
  details.book summary::-webkit-details-marker { display: none; }
  details.book summary::after { content: "▾"; float: right; color: var(--dim); transition: transform .2s; }
  details.book[open] summary::after { transform: rotate(180deg); }
  .book h2 { display: inline; font-size: .95em; margin: 0; }
  .book .prog { font-size: .74em; color: var(--dim); margin-top: 4px; }
  .bbody { padding: 0 14px 14px; }
  .resume {
    display: block; width: 100%; margin: 0 0 10px; padding: 10px;
    background: linear-gradient(135deg, rgba(53,211,153,.18), rgba(34,211,238,.12));
    color: var(--acc); border: 1px solid rgba(53,211,153,.35); border-radius: 10px;
    font-size: .85em; cursor: pointer;
  }
  .parts { gap: 0; }
  .parts li { display: flex; align-items: baseline; gap: 10px; padding: 10px 2px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .parts li:last-child { border-bottom: 0; }
  .parts .pn { flex: none; font-size: .78em; color: var(--dim); font-variant-numeric: tabular-nums; width: 3.6em; }
  .parts .ps { flex: 1; font-size: .82em; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .parts .pm { flex: none; font-size: .72em; color: var(--dim); }
  .parts li.playing .ps, .parts li.playing .pn { color: var(--acc); }
  .empty { color: var(--dim); font-size: .85em; padding: 20px 4px; text-align: center; }
  .ghead { padding: 14px 4px 4px; font-size: .8em; color: var(--acc); letter-spacing: .1em; border: 0; cursor: default; background: none; }
  /* 资讯板块卡片:复用书籍 details.book 外观,内层每集仍是普通卡片 */
  #list li.gcard, #list li.gcard:active { padding: 0; background: none; border: 0; cursor: default; }
  .newsg .glist { padding: 0 10px 12px; }
  .doc { margin-left: auto; color: var(--dim); border: 1px solid var(--line); padding: 1px 8px; border-radius: 999px; cursor: pointer; flex: none; }
  li.playing .doc, .doc:active { color: var(--acc); border-color: var(--acc); }
  .script { margin-top: 10px; padding: 10px 12px; background: var(--card2); border-radius: 10px; font-size: .82em; line-height: 1.7; color: var(--dim); white-space: pre-wrap; max-height: 40vh; overflow-y: auto; cursor: auto; }

  /* ---- 设置 ---- */
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 12px; position: relative; }
  .card h2 { font-size: .92em; margin: 0 0 8px; display: flex; align-items: center; gap: 8px; }
  .qm {
    width: 18px; height: 18px; border-radius: 50%; padding: 0; line-height: 1;
    border: 1px solid var(--line); background: var(--card2); color: var(--dim);
    font-size: .72em; cursor: pointer; flex: none;
  }
  .help {
    display: none; position: absolute; left: 10px; right: 10px; top: 40px; z-index: 30;
    font-size: .78em; color: var(--text); line-height: 1.7;
    background: var(--card2); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, .5);
  }
  .help.on { display: block; }
  .help b { color: var(--text); font-weight: 600; }
  .card input {
    width: 100%; background: var(--card2); border: 1px solid var(--line); color: var(--text);
    padding: 9px 10px; border-radius: 9px; font-size: .85em; margin-bottom: 8px;
  }
  .srcrow { display: flex; gap: 6px; margin-bottom: 6px; }
  .srcrow input { margin: 0; }
  .srcrow .sn { flex: 0 0 30%; }
  .srcrow .su { flex: 1; }
  .srcrow .del { flex: none; background: var(--card2); border: 1px solid var(--line); color: #f87171; border-radius: 9px; width: 38px; cursor: pointer; }
  .hint { font-size: .74em; color: var(--dim); word-break: break-all; margin-bottom: 8px; }
  .msg { font-size: .78em; color: var(--acc); min-height: 1.2em; }
  .msg.err { color: #f87171; }
</style>
</head>
<body>
<header><h1 id="title">跑步听什么</h1><span class="sub" data-i18n="sub">私人电台</span><button class="pill" id="langBtn">EN</button></header>

<div class="player">
  <div class="np-label">NOW PLAYING</div>
  <div class="np-title" id="now"></div>
  <div class="status" id="status"></div>
  <div class="seekrow"><span id="cur">0:00</span><input type="range" id="seek" min="0" max="0" value="0" step="1"><span id="dur">0:00</span></div>
  <div class="controls">
    <button class="ctl" id="btnPrev" aria-label="prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zM18 6v12l-8.5-6z"/></svg></button>
    <button class="ctl" id="bk15">−15</button>
    <button class="ctl big" id="btnPlay" aria-label="play/pause"><svg id="icoPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
    <button class="ctl" id="fw15">+15</button>
    <button class="ctl" id="btnNext" aria-label="next"><svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg></button>
  </div>
  <div class="pills">
    <button class="pill" id="btnRate">1x</button>
    <button class="pill" id="btnSleep"></button>
  </div>
</div>

<div class="tabs" id="tabs">
  <button data-v="news" class="on" data-i18n="tabNews">资讯</button><button data-v="books" data-i18n="tabBooks">书籍</button><button data-v="set" data-i18n="tabSet">设置</button>
</div>
<ul id="list"></ul>
<div id="books" style="display:none"></div>
<div id="set" style="display:none">
  <div class="card">
    <h2><span data-i18n="cardFeed">播客订阅地址</span> <button class="qm" aria-label="?">?</button></h2>
    <div class="help" data-i18n="helpFeed"></div>
    <div class="hint" id="feedUrl"></div>
    <button class="pill" id="copyFeed" data-i18n="btnCopyFeed">复制</button>
    <a class="pill" id="subApple" style="text-decoration:none;display:inline-block">Apple Podcasts</a>
    <a class="pill" id="subOvercast" style="text-decoration:none;display:inline-block">Overcast</a>
    <a class="pill" id="subPocket" style="text-decoration:none;display:inline-block">Pocket Casts</a>
  </div>
  <div class="card">
    <h2><span data-i18n="cardTok">管理口令</span> <button class="qm" aria-label="?">?</button></h2>
    <div class="help" data-i18n="helpTok"></div>
    <input id="admTok" type="password" data-i18n-ph="phTok" placeholder="">
    <div class="msg" id="tokMsg"></div>
  </div>
  <div class="card">
    <h2><span data-i18n="cardSrc">订阅源</span> <button class="qm" aria-label="?">?</button></h2>
    <div class="help" data-i18n="helpSrc"></div>
    <div id="srcList"></div>
    <div class="hint" data-i18n="presetHint" style="margin-top:6px">常用源(点一下即加入,记得保存):</div>
    <div id="srcPresets" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px"></div>
    <button class="pill" id="addSrc" data-i18n="btnAddSrc">+ 加一个源</button>
    <button class="resume" id="saveCfg" style="margin-top:10px" data-i18n="btnSave">保存</button>
    <div class="msg" id="setMsg"></div>
  </div>
  <div class="card">
    <h2><span data-i18n="cardUrl">转单篇文章</span> <button class="qm" aria-label="?">?</button></h2>
    <div class="help" data-i18n="helpUrl"></div>
    <input id="oneUrl" data-i18n-ph="phUrl" placeholder="">
    <button class="resume" id="sendUrl" data-i18n="btnSendUrl">转成一集</button>
    <div class="msg" id="qMsg"></div>
  </div>
  <div class="card">
    <h2><span data-i18n="cardBook">上传电子书</span> <button class="qm" aria-label="?">?</button></h2>
    <div class="help" data-i18n="helpBook"></div>
    <input type="file" id="bookFile" accept=".epub,.txt,.html,.htm,.pdf,.mobi,.azw,.azw3,.fb2,.docx,application/epub+zip,application/pdf,text/plain,text/html,application/x-mobipocket-ebook,application/vnd.amazon.ebook">
    <button class="resume" id="upBook" data-i18n="btnUpBook">上传</button>
    <div class="msg" id="bkMsg"></div>
  </div>
</div>
<audio id="a" preload="none"></audio>

<script src="config.js"></script>

// 节流而非防抖:播放中每 5 秒有新进度,防抖会被无限重置永不触发。
var progressPushTimer = null, progressPushedAt = 0;
function scheduleProgressPush() {
  if (!localStorage.getItem('admtok')) return;
  if (Date.now() - progressPushedAt > 30000) { pushProgress(); return; }
  if (!progressPushTimer) progressPushTimer = setTimeout(pushProgress, 8000);
}
function collectProgress() {
  var m = {};
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && k.indexOf('bk-') === 0) {
      try { m[k] = JSON.parse(localStorage.getItem(k)); } catch (e) {}
    }
  }
  return m;
}
function pushProgress() {
  clearTimeout(progressPushTimer); progressPushTimer = null; progressPushedAt = Date.now();
  var body = JSON.stringify(collectProgress());
  if (body.length > 60000) return;
  // keepalive:手机划掉 PWA/切后台时请求仍能发出,否则整段收听进度丢失
  fetch('/api/progress', { method: 'PUT', headers: admHeaders(true), body: body, keepalive: true }).catch(function () {});
}

function pullProgress() {
  if (!localStorage.getItem('admtok')) return;
  fetch('/api/progress', { headers: admHeaders() }).then(function (r) {
    if (!r.ok) throw 0;
    return r.json();
  }).then(function (remote) {
    var localNewer = false;
    Object.keys(remote || {}).forEach(function (k) {
      if (k.indexOf('bk-') !== 0 || !remote[k] || typeof remote[k] !== 'object') return;
      var loc = null;
      try { loc = JSON.parse(localStorage.getItem(k)); } catch (e) {}
      if (!loc || (remote[k].at || 0) > (loc.at || 0)) {
        localStorage.setItem(k, JSON.stringify(remote[k]));
      } else if (loc && (loc.at || 0) > (remote[k].at || 0)) {
        localNewer = true;
      }
    });
    var rk = Object.keys(remote || {});
    // 本地有云端没有的书进度,或本地更新 → 回推一次
    if (localNewer || Object.keys(collectProgress()).some(function (k) { return rk.indexOf(k) < 0; })) pushProgress();

  }).catch(function () {});
}

// 手机端文件选择器(content:// / 微信、网盘另存的文件)常报不带扩展名的显示名,
// 不能只认文件名后缀:依次回退 MIME 类型、文件头魔数(epub 是 zip 的 PK、PDF 是 %PDF)补出扩展名。
function resolveBookName(f, cb) {
  var name = (f.name || 'book').replace(/[/\\]/g, '_');
  if (/\.(epub|txt|html?|pdf|mobi|azw3?|fb2|docx)$/i.test(name)) { cb(name); return; }
  var byMime = {
    'application/epub+zip': '.epub', 'application/pdf': '.pdf',
    'text/plain': '.txt', 'text/html': '.html',
    'application/x-mobipocket-ebook': '.mobi', 'application/vnd.amazon.ebook': '.azw3',
    'application/x-fictionbook+xml': '.fb2',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document': '.docx'
  }[(f.type || '').split(';')[0].toLowerCase()];
  if (byMime) { cb(name + byMime); return; }
  // FileReader 而非 Blob.arrayBuffer():微信内置浏览器/老 WebView 不支持后者
  try {
    var rd = new FileReader();
    rd.onload = function () {
      var head = String.fromCharCode.apply(null, new Uint8Array(rd.result));
      if (head.slice(60, 68) === 'BOOKMOBI') cb(name + '.mobi');
      else if (head.indexOf('PK') === 0) cb(name + '.epub');
      else if (head.indexOf('%PDF') === 0) cb(name + '.pdf');
      else if ((f.type || '').indexOf('text/') === 0) cb(name + '.txt');
      else cb(null);
    };
    rd.onerror = function () { cb(null); };
    rd.readAsArrayBuffer(f.slice(0, 68));
  } catch (e) { cb(null); }
}

  var url = document.getElementById('oneUrl').value.trim();
  if (!/^https?:\/\//.test(url)) { msg(qMsg, t('badUrl'), true); return; }
  fetch('/api/queue', { method: 'POST', headers: admHeaders(true), body: JSON.stringify({ url: url }) })
    .then(function (r) { if (!r.ok) throw new Error(r.status === 401 ? t('tokFirst') : 'HTTP ' + r.status); return r.json(); })
    .then(function (d) { msg(qMsg, tf('queued', { n: d.queued })); document.getElementById('oneUrl').value = ''; })
    .catch(function (e) { msg(qMsg, t('queueFail') + e.message, true); });
};

// ---- 语言应用与切换 ----
function applyLang() {
  document.documentElement.lang = L === 'zh' ? 'zh-CN' : 'en';
  [].forEach.call(document.querySelectorAll('[data-i18n]'), function (el) { el.innerHTML = t(el.getAttribute('data-i18n')); });
  [].forEach.call(document.querySelectorAll('[data-i18n-ph]'), function (el) { el.placeholder = t(el.getAttribute('data-i18n-ph')); });
  [].forEach.call(srcList.querySelectorAll('.sn'), function (el) { el.placeholder = t('phSrcName'); });
  [].forEach.call(srcList.querySelectorAll('.su'), function (el) { el.placeholder = t('phSrcUrl'); });
  document.getElementById('langBtn').textContent = L === 'zh' ? 'EN' : '中文';
  if (!a.src) nowEl.textContent = t('npEmpty');
  updateRateBtn(); updateSleepBtn(); updateTokState();
}
function restorePlaying() {
  if (!a.src) return;
  var lists = [newsItems].concat(bookPartLists);
  for (var li = 0; li < lists.length; li++) {
    for (var i = 0; i < lists[li].length; i++) {
      if (lists[li][i].url === a.src) {
        q = { list: lists[li], i: i };
        if (lists[li][i].li) lists[li][i].li.classList.add('playing');
        return;
      }
    }
  }
}
document.getElementById('langBtn').onclick = function () {
  L = L === 'zh' ? 'en' : 'zh';
  localStorage.setItem('lwr-lang', L);
  applyLang();
  if (feedEntries) { listEl.innerHTML = ''; newsItems = []; renderNews(); }
  if (booksData) { booksEl.innerHTML = ''; renderBooks(); }
  restorePlaying();
};

// 逐字稿:按需拉 transcripts/<集id>.txt,旧集没有则提示
function toggleDoc(li, audioUrl) {
  var d = li.querySelector('.script');
  if (d) { d.remove(); return; }
  d = document.createElement('div');
  d.className = 'script';
  d.textContent = '…';
  d.onclick = function (ev) { ev.stopPropagation(); };
  li.appendChild(d);
  var id = (audioUrl.split('/').pop() || '').replace(/\.mp3$/, '');
  fetch(BASE + 'transcripts/' + id + '.txt').then(function (r) {
    if (!r.ok) throw 0;
    return r.text();
  }).then(function (tx) { d.textContent = tx; }).catch(function () { d.textContent = t('noDoc'); });
}

// ---- 资讯:读 feed.xml ----
var newsSort = localStorage.getItem('lwr-newsort') || 'group';
// 折叠的板块名集合,持久化;折叠只影响显示,连播顺序不变
var newsFold = {};
try { JSON.parse(localStorage.getItem('lwr-newsfold') || '[]').forEach(function (g) { newsFold[g] = 1; }); } catch (e) {}
function renderNews() {
  if (feedTitle) { document.title = feedTitle; document.getElementById('title').textContent = feedTitle; }
  function addEntry(e, container) {
    var li = document.createElement('li');
    li.innerHTML = '<span class="t"></span><span class="m"><span class="src"></span><span class="mm"></span></span>';
    li.querySelector('.t').textContent = e.title || t('untitled');
    li.querySelector('.src').textContent = e.src || t('unknownSrc');
    li.querySelector('.mm').textContent = (e.pub ? fmtBeijing(e.pub) : '') + ' · ' + tf('minLong', { n: mins(e.bytes) });
    var item = { title: e.title, url: e.url, li: li };
    var doc = document.createElement('span');
    doc.className = 'doc';
    doc.textContent = t('btnDoc');
    doc.onclick = (function (u) { return function (ev) { ev.stopPropagation(); toggleDoc(li, u); }; })(e.url);
    li.querySelector('.m').appendChild(doc);
    li.onclick = (function (idx) { return function () { play(newsItems, idx); }; })(newsItems.length);
    (container || listEl).appendChild(li);
    newsItems.push(item);
  }
  // 排序切换:按板块(feed 原分组)/ 按时间(全部平铺倒序);连播顺序 = 显示顺序
  if (feedEntries.length > 1) {
    var sb = document.createElement('li');
    sb.className = 'ghead';
    sb.style.textAlign = 'right';
    var btn = document.createElement('button');
    btn.className = 'pill';
    btn.textContent = t(newsSort === 'time' ? 'sortTime' : 'sortGroup');
    btn.onclick = function () {
      newsSort = newsSort === 'time' ? 'group' : 'time';
      localStorage.setItem('lwr-newsort', newsSort);
      listEl.innerHTML = ''; newsItems = []; renderNews(); restorePlaying();
    };
    sb.appendChild(btn);
    listEl.appendChild(sb);
  }
  if (newsSort === 'time') {
    feedEntries.slice().sort(function (x, y) {
      return (Date.parse(y.pub) || 0) - (Date.parse(x.pub) || 0);
    }).forEach(function (e) { addEntry(e); });
  } else {
    var groups = [];
    feedEntries.forEach(function (e) {
      var g = e.group || t('groupOther');
      if (groups.indexOf(g) < 0) groups.push(g);
    });
    groups.forEach(function (g) {
      var mine = feedEntries.filter(function (e) { return (e.group || t('groupOther')) === g; });
      if (groups.length === 1) { mine.forEach(function (e) { addEntry(e); }); return; }
      // 板块 = 书籍同款可折叠卡片(details/summary),折叠状态持久化
      var wrap = document.createElement('li');
      wrap.className = 'gcard';
      var dt = document.createElement('details');
      dt.className = 'book newsg';
      dt.open = !newsFold[g];
      var head = document.createElement('summary');
      head.innerHTML = '<h2></h2><div class="prog"></div>';
      head.querySelector('h2').textContent = g;
      head.querySelector('.prog').textContent = tf('epCount', { n: mine.length });
      dt.appendChild(head);
      var gul = document.createElement('ul');
      gul.className = 'glist';
      mine.forEach(function (e) { addEntry(e, gul); });
      dt.appendChild(gul);
      dt.ontoggle = function () {
        var closed = !dt.open;
        if (closed === !!newsFold[g]) return;
        if (closed) newsFold[g] = 1; else delete newsFold[g];
        localStorage.setItem('lwr-newsfold', JSON.stringify(Object.keys(newsFold)));
      };
      wrap.appendChild(dt);
      listEl.appendChild(wrap);
    });
  }
  if (!a.src) setStatus(newsItems.length ? tf('epCount', { n: newsItems.length }) : t('feedEmpty'));
}
if (!BASE) {
  nowEl.textContent = t('noBase');
  listEl.innerHTML = '<li class="empty">' + t('noCfgJs') + '</li>';
}
if (BASE) fetch(BASE + 'feed.xml').then(function (r) { return r.text(); }).then(function (xml) {
  var doc = new DOMParser().parseFromString(xml, 'text/xml');
  var chTitle = doc.querySelector('channel > title');
  feedTitle = chTitle ? chTitle.textContent : '';
  // 先收集,再按 <category> 分组渲染;连播顺序 = 分组后的显示顺序
  feedEntries = [];
  [].forEach.call(doc.querySelectorAll('item'), function (node) {
    var enc = node.querySelector('enclosure');
    if (!enc) return;
    feedEntries.push({
      title: (node.querySelector('title') || {}).textContent || '',
      src: (node.getElementsByTagName('itunes:author')[0] || {}).textContent || '',
      pub: (node.querySelector('pubDate') || {}).textContent || '',
      group: (node.querySelector('category') || {}).textContent || '',
      url: enc.getAttribute('url'),
      bytes: +enc.getAttribute('length')
    });
  });
  renderNews();
  // 离线预取:最新 3 集缓存到本机,出门没网也能听
  if (navigator.serviceWorker && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'prefetch', urls: newsItems.slice(0, 3).map(function (x) { return x.url; }) });
  }
}).catch(function (e) { setStatus(t('feedFail') + e.message, true); });

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

// ---- 书籍:读 books.json ----
function renderBooks() {
  bookPartLists = [];
  if (!booksData.books || !booksData.books.length) { booksEl.innerHTML = '<div class="empty">' + t('noBooks') + '</div>'; return; }
  booksData.books.forEach(function (b, bi) {
    var card = document.createElement('details');
    card.className = 'book';
    if (bi === 0) card.open = true;
    var parts = [];
    bookPartLists.push(parts);
    var head = document.createElement('summary');
    head.innerHTML = '<h2></h2><div class="prog"></div>';
    head.querySelector('h2').textContent = bookDisp(b.name);
    head.querySelector('.prog').textContent = tf('progLine', { a: b.parts.length, b: b.totalParts, m: mins(b.parts.length ? b.parts[0].bytes : 0) });
    card.appendChild(head);
    var body = document.createElement('div');
    body.className = 'bbody';
    var saved = null;
    try { saved = JSON.parse(localStorage.getItem('bk-' + b.id)); } catch (e) {}
    if (saved && saved.p !== undefined && saved.p !== null) {
      var btn = document.createElement('button');
      btn.className = 'resume';
      btn.textContent = t('resume') + (saved.p === 0 ? t('introLbl') : tf('partN', { n: saved.p })) + ' ' + fmtSec(saved.t);
      btn.onclick = function () {
        var idx = parts.findIndex(function (x) { return x.p === saved.p; });
        if (idx >= 0) play(parts, idx, saved.t);
      };
      body.appendChild(btn);
    }
    var ul = document.createElement('ul');
    ul.className = 'parts';
    var rows = (b.intro ? [b.intro] : []).concat(b.parts);
    rows.forEach(function (part, idx) {
      var li = document.createElement('li');
      li.innerHTML = '<span class="pn"></span><span class="ps"></span><span class="pm"></span>';
      li.querySelector('.pn').textContent = part.p === 0 ? t('introLbl') : tf('pnN', { n: part.p });
      li.querySelector('.ps').textContent = part.s || '';
      li.querySelector('.pm').textContent = tf('minShort', { n: mins(part.bytes) });
      li.onclick = function () { play(parts, idx); };
      ul.appendChild(li);
      parts.push({
        title: bookDisp(b.name) + (part.p === 0 ? ' · ' + t('introLbl') : ' · ' + tf('partN', { n: part.p })),
        url: BASE + part.path, li: li, bookId: b.id, p: part.p
      });
    });
    body.appendChild(ul);
    card.appendChild(body);
    booksEl.appendChild(card);
  });
}
if (BASE) fetch(BASE + 'books.json').then(function (r) { if (!r.ok) throw 0; return r.json(); }).then(function (m) {
  booksData = m;
  renderBooks();
}).catch(function () { booksEl.innerHTML = '<div class="empty">' + t('booksPendingHint') + '</div>'; });

applyLang();
</script>
</body>
